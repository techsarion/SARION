services:
  postgres:
    image: postgres:16-alpine
    container_name: sarion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sarion
      POSTGRES_PASSWORD: sarion
      POSTGRES_DB: sarion
    ports:
      - "5432:5432"
    volumes:
      - sarion_pgdata:/var/lib/postgresql/data

volumes:
  sarion_pgdata:
